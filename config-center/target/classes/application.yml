spring:
  application:
    name: config-center
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.3.181:3306/config_center?useSSL=false&serverTimezone=UTC
    username: root
    password: mysql_ZJHZsF
  redis:
    enabled: true  # Redis开关，设为false时禁用Redis缓存
    host: 192.168.3.181
    port: 6379
    password: redis_T2G6Yh
    database: 0
    timeout: 10000
    client-type: lettuce
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0
      shutdown-timeout: 100ms
