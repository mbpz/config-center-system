spring:
  application:
    name: config-center
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/config_center?useSSL=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:config_user}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  redis:
    enabled: true  # Redis开关，设为false时禁用Redis缓存
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: ${SPRING_REDIS_DATABASE:0}
    timeout: 10000
    client-type: lettuce
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0
      shutdown-timeout: 100ms
    connect-timeout: 5000
    socket-timeout: 5000
    client-name: config-center

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.crgmhrc.configcenter.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8080}

# Security 配置
CC_ADMIN_PASSWORD: ${CC_ADMIN_PASSWORD:}
CC_USER_PASSWORD: ${CC_USER_PASSWORD:}
CC_CORS_ALLOWED_ORIGINS: ${CC_CORS_ALLOWED_ORIGINS:*}

logging:
  level:
    root: INFO
    com.crgmhrc.configcenter: INFO
    org.springframework.cache: INFO
    org.springframework.data.redis: INFO
