spring:
  application:
    name: config-center
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/config_center?useSSL=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:config_user}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  redis:
    enabled: true  # Redis开关，设为false时禁用Redis缓存
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: ${SPRING_REDIS_DATABASE:0}
    timeout: 10000
    client-type: lettuce
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0
      shutdown-timeout: 100ms
    connect-timeout: 5000
    socket-timeout: 5000
    client-name: config-center

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.crgmhrc.configcenter.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8080}

# Security 配置
# ⚠️ 生产环境必须修改 CC_ADMIN_PASSWORD！
CC_ADMIN_PASSWORD: admin
CC_USER_PASSWORD: user
CC_CORS_ALLOWED_ORIGINS: '*'

# 加密配置
# ⚠️ 生产环境必须设置！未设置时自动生成随机密钥（每次重启失效）
CC_MASTER_KEY:
# 自动加密的 key 模式 (Ant-style, 逗号分隔)
# 匹配这些模式的 key 会自动加密存储，无需手动设置 encrypted=true
CC_ENCRYPT_PATTERNS: "*.password,*.secret,*.token,*.apikey,*.private_key"

# Actuator 端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    prometheus:
      access: read_only
  metrics:
    tags:
      application: ${spring.application.name:config-center}
      environment: ${ENV:production}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    export:
      prometheus:
        enabled: true
  health:
    redis:
      enabled: true

logging:
  level:
    root: INFO
    com.crgmhrc.configcenter: INFO
    org.springframework.cache: INFO
    org.springframework.data.redis: INFO
