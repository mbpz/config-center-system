apiVersion: v1
kind: Secret
metadata:
  name: config-center
  labels:
    app: config-center
type: Opaque
stringData:
  # ⚠️ 使用真实值替换！这是示例占位符
  # 生成方式: echo -n 'your_real_password' | base64
  SPRING_DATASOURCE_PASSWORD: "REPLACE_WITH_REAL_DB_PASSWORD"
  SPRING_REDIS_PASSWORD: "REPLACE_WITH_REAL_REDIS_PASSWORD"
  CC_ADMIN_PASSWORD: "REPLACE_WITH_STRONG_ADMIN_PASSWORD"
  CC_USER_PASSWORD: "REPLACE_WITH_STRONG_USER_PASSWORD"
  CC_MASTER_KEY: "REPLACE_WITH_16_PLUS_CHAR_MASTER_KEY"
