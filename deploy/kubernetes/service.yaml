apiVersion: v1
kind: Service
metadata:
  name: config-center
  labels:
    app: config-center
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: config-center
---
