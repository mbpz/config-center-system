name: Docker Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (如 v0.3.0 或 latest)'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '8'
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: mbpz/config-center-system
  DOCKERHUB_IMAGE_NAME: dougzeng/config-center

jobs:
  # =====================================================
  # 构建测试
  # =====================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: ./config-center
        run: mvn clean verify -B

  # =====================================================
  # 构建并推送 Docker 镜像 (ghcr.io + Docker Hub)
  # =====================================================
  docker-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        working-directory: ./config-center
        run: mvn clean package -B -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      # === 推送到 GitHub Container Registry ===
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./config-center
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # === 推送到 Docker Hub ===
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./config-center
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
            ${{ env.DOCKERHUB_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "=== Docker 镜像已推送 ==="
          echo ""
          echo "GitHub Container Registry:"
          echo "  docker pull ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}"
          echo ""
          echo "Docker Hub:"
          echo "  docker pull ${{ env.DOCKERHUB_IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}"
          echo ""
          echo "快速启动:"
          echo "  docker run -d -p 8080:8080 \\"
          echo "    -e SPRING_DATASOURCE_URL=jdbc:mysql://host:3306/config_center \\"
          echo "    -e SPRING_DATASOURCE_PASSWORD=xxx \\"
          echo "    -e SPRING_REDIS_PASSWORD=xxx \\"
          echo "    -e CC_ADMIN_PASSWORD=xxx \\"
          echo "    ${{ env.DOCKERHUB_IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}"
