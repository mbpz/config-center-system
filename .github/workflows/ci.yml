name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '8'
  NODE_VERSION: '20'

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with Maven
        working-directory: ./config-center
        run: mvn clean test -B

      - name: Generate JaCoCo coverage report
        working-directory: ./config-center
        run: mvn jacoco:report -B

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: config-center/target/site/jacoco/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: config-center/target/surefire-reports/

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: config-web/yarn.lock

      - name: Install dependencies
        working-directory: ./config-web
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: ./config-web
        run: yarn build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        working-directory: ./config-center
        run: mvn clean package -B -DskipTests

      - name: Build Docker image
        working-directory: ./config-center
        run: docker build -t config-center:ci-test .

      - name: Verify Docker image
        run: |
          docker images | grep config-center
          echo "Docker image built successfully"

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate SBOM (CycloneDX)
        working-directory: ./config-center
        run: mvn clean package -B -DskipTests

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: config-center/target/*.sbom.json
